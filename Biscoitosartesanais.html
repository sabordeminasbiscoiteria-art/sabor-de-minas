<script>
const searchInput = document.getElementById("searchInput");
const products = document.querySelectorAll(".card");
const noResult = document.getElementById("noResult");

searchInput.addEventListener("keyup", () => {
  let search = searchInput.value.toLowerCase();
  let visible = 0;

  products.forEach(card => {
    let name = card.getAttribute("data-name").toLowerCase();
    if(name.includes(search)){
      card.style.display = "block";
      visible++;
    }else{
      card.style.display = "none";
    }
  });

  noResult.style.display = visible === 0 ? "block" : "none";
});

const descricaoProdutos = {
casadinho: "Biscoito creme de avelã.Disponível em nossa loja física.",
goiabada: "Casadinho com recheio de goiabada artesanal.Disponível em nossa loja física.",
canela: "Biscoito crocante com sabor suave de canela.Disponível em nossa loja física.",
ugauga: "Biscoito caseiro tradicional muito saboroso.Disponível em nossa loja física.",
beijinho: "Biscoito doce com recheio goiabada.Disponível em nossa loja física.",
bambole: "Biscoito crocante e leve perfeito para café.Disponível em nossa loja física.",
sasha: "Biscoito amanteigado com cholocate.Disponível em nossa loja física."
};

function abrirProduto(id,nome){
  document.getElementById("produtoModal").style.display = "flex";
  document.getElementById("produtoTitulo").innerText = nome;
  document.getElementById("produtoDescricao").innerText = descricaoProdutos[id];
}

function fecharProduto(){
  document.getElementById("produtoModal").style.display = "none";
}
</script>
