<script>

const fotoPrincipal = document.getElementById("fotoPrincipal");
const miniaturas = document.querySelectorAll(".miniatura");

const modal = document.getElementById("modalImagem");
const imagemAmpliada = document.getElementById("imagemAmpliada");
const fechar = document.querySelector(".fechar");

/* Troca foto principal */

miniaturas.forEach(miniatura => {

  miniatura.addEventListener("click", () => {
    fotoPrincipal.src = miniatura.src;
  });

});

/* Abre a foto principal */

fotoPrincipal.addEventListener("click", () => {

  imagemAmpliada.src = fotoPrincipal.src;
  modal.style.display = "flex";

});

/* Abre também as miniaturas */

miniaturas.forEach(miniatura => {

  miniatura.addEventListener("dblclick", () => {

    imagemAmpliada.src = miniatura.src;
    modal.style.display = "flex";

  });

});

/* Fecha no X */

fechar.addEventListener("click", () => {

  modal.style.display = "none";

});

/* Fecha clicando fora */

modal.addEventListener("click", (e) => {

  if (e.target === modal) {

    modal.style.display = "none";

  }

});

/* Fecha com ESC */

document.addEventListener("keydown", (e) => {

  if (e.key === "Escape") {

    modal.style.display = "none";

  }

});

</script>
