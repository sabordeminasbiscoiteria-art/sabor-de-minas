  <div class="menu-search-wrapper">
    <nav class="nav-links">
      <a href="index.html">Início</a>

  <span class="icone-lupa">
    <svg viewBox="0 0 24 24" width="16" height="16">

<!-- Menu lateral -->

<!-- ================= CONTEÚDO PRINCIPAL ================= -->
<main>
  <!-- Banner do beijinho -->
  <section class="destaque">
    <p class="descricao">
      Biscoitos caseiros, o sabor que alegra o seu dia.<br>
      Feitos com carinho desde 2015. Encomendas pelo WhatsApp.
    </p>
    <button class="btn-ver">Ver nossos biscoitos</button>
  </section>

  <!-- Vitrine com 3 fotos -->
  <section class="vitrine">
    <img src="img/sasha.jpeg" alt="Sasha" class="vitrine-img">
    <img src="img/ugauga.jpeg" alt="Ugauga" class="vitrine-img">
    <img src="img/casadinho.jpeg" alt="Casadinho" class="vitrine-img">
  </section>

  <!-- Mensagem Ver Mais -->
  <div id="mensagem"></div>
</main>

<!-- ================= RODAPÉ ================= -->
<footer class="rodape">
  <div class="rodape-conteudo">
    <p>&copy; 2026 Biscoiteria Sabor de Minas. Todos os direitos reservados.</p>
    <p>Contato: <a href="tel:+553192767228">WhatsApp</a> | <a href="mailto:contato@sabordeminas.com.br">Email</a></p>
    <div class="redes-sociais">
      <a href="#"><img src="img/icon-instagram.png" alt="Instagram" class="icone-social"></a>
      <a href="#"><img src="img/icon-whatsapp.png" alt="WhatsApp" class="icone-social"></a>
    </div>
  </div>
</footer>
  
<!-- ================= JAVASCRIPT ================= -->
<script>
  // MENU LATERAL
  const menuBtn = document.getElementById('menuBtn');
  const menuLateral = document.getElementById('menuLateral');
  const menuClose = document.getElementById('menuClose');

  menuBtn.addEventListener('click', () => {
    menuLateral.classList.add('ativo');
  });

  menuClose.addEventListener('click', () => {
    menuLateral.classList.remove('ativo');
  });

  // VER MAIS TOGGLE
  const botoes = document.querySelectorAll(".btn-ver");
  const mensagem = document.getElementById("mensagem");

  botoes.forEach(botao => {
    botao.addEventListener("click", () => {
      const card = botao.parentElement;
      const texto = card.getAttribute("data-descricao");

      if (mensagem.style.display === "block" && mensagem.textContent === texto) {
        mensagem.style.display = "none";
      } else {
        mensagem.textContent = texto;
        mensagem.style.display = "block";
      }
    });
  });

  // CLICAR NA MENSAGEM PARA FECHAR
  mensagem.addEventListener("click", () => {
    mensagem.style.display = "none";
  });

  // PESQUISA DE PRODUTOS
  const inputPesquisa = document.getElementById("inputPesquisa");
  const cards = document.querySelectorAll(".card-produto");
  const semProduto = document.getElementById("sem-produto");

  inputPesquisa.addEventListener("input", () => {
    const valor = inputPesquisa.value.toLowerCase();
    let achou = false;

    cards.forEach(card => {
      const nome = card.querySelector("img").alt.toLowerCase();
      if (nome.includes(valor)) {
        card.style.display = "block";
        achou = true;
      } else {
        card.style.display = "none";
      }
    });

    semProduto.style.display = achou ? "none" : "block";
  });
</script>

<a href="https://wa.me/553192767228" class="whatsapp-float" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
</a>
  
</body>
</html>
