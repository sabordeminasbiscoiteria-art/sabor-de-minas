<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biscoiteria Sabor de Minas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= MENU FIXO ================= -->
<header class="header-fixo">
  <div class="logo-nome">
    <img src="logo.png" alt="Logo da Biscoiteria Sabor de Minas" class="logo">
    <span class="nome-loja">Biscoiteria Sabor de Minas</span>
  </div>
  <div class="search-box">
    <input type="text" placeholder="Pesquisar...">
  </div>
</header>

<!-- ================= MENU LATERAL CELULAR ================= -->
<div class="menu-btn" id="menuBtn">&#9776;</div> <!-- abrir menu -->
<div class="menu-lateral" id="menuLateral">
 <div class="menu-close" id="menuClose">&times;</div> <!-- fechar menu -->
  <a href="#">Início</a>
  <a href="#">Produtos</a>
  <a href="#">Sobre</a>
  <a href="#">Contato</a>
</div>

<!-- ================= CONTEÚDO PRINCIPAL ================= -->
<main>
  <!-- Foto do beijinho grande -->
  <section class="destaque">
    <img src="beijinho.jpeg" alt="Beijinho" class="beijinho-grande">
    <p class="descricao">
      Biscoitos caseiros, o sabor que alegra o seu dia. Feitos com carinho desde 2015. Encomendas pelo WhatsApp.
    </p>
    <button class="btn-ver">Ver nossos biscoitos</button>
  </section>

  <!-- Vitrine com 3 fotos -->
  <section class="vitrine">
    <img src="sasha.jpeg" alt="Sasha" class="vitrine-img">
    <img src="ugauga.jpeg" alt="Ugauga" class="vitrine-img">
    <img src="casadinho.jpeg" alt="Casadinho" class="logo-img">
  </section>
</main>

<!-- ================= RODAPÉ ================= -->
<footer class="rodape">
  <div class="rodape-conteudo">
    <p>&copy; 2026 Biscoiteria Sabor de Minas. Todos os direitos reservados.</p>
    <p>Contato: <a href="tel:+559999999999">WhatsApp</a> | <a href="mailto:contato@sabordeminas.com.br">Email</a></p>
    <div class="redes-sociais">
      <a href="#"><img src="icon-facebook.png" alt="Facebook" class="icone-social"></a>
      <a href="#"><img src="icon-instagram.png" alt="Instagram" class="icone-social"></a>
      <a href="#"><img src="icon-whatsapp.png" alt="WhatsApp" class="icone-social"></a>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
