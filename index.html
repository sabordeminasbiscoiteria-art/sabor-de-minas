.slider{
width:100%;

margin:auto;
overflow:hidden;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.slides{
display:flex;
width:300%;
animation:slide 12s infinite;
}

.slides img{
width:100%;
height:300px;

}

/* ANIMAÇÃO */

@keyframes slide{

30%{margin-left:0;}

65%{margin-left:-100%;}

70%{margin-left:-200%;}

}
