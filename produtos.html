<!-- HEADER + MENU LATERAL (igual ao site principal) -->
<header class="header-fixo">
  <div class="logo-nome">
    <img src="img/logo.png" alt="Logo" class="logo">
    <span class="nome-loja">Biscoiteria Sabor de Minas</span>
  </div>

  <div class="menu-search-wrapper">
    <nav class="nav-links">
      <a href="inicio.html">Início</a>
      <a href="produtos.html">Produtos</a>

    </nav>
    <div class="search-box">

  </div>

  <div class="menu-btn" id="menuBtn">&#9776;</div>
</header>

<div class="menu-lateral" id="menuLateral">
  <div class="menu-close" id="menuClose">&times;</div>
  <a href="inicio.html">Início</a>
  <a href="produtos.html">Produtos</a>
  <a href="sobre.html">Sobre</a>

<!-- CARDS DE PRODUTOS -->
<section class="produtos-container">
  <div class="card-produto">
    <div class="selo-gramas">250g</div>
    <img src="img/sasha.jpeg" alt="Sasha">
    <button class="btn-card btn-ver">Ver mais</button>
    <button class="btn-card btn-preco">R$10,99</button>
  </div>

  <div class="card-produto">
    <div class="selo-gramas">250g</div>
    <img src="img/ugauga.jpeg" alt="Ugauga">
    <button class="btn-card btn-ver">Ver mais</button>
    <button class="btn-card btn-preco">R$10,99</button>
  </div>

  <div class="card-produto">
    <div class="selo-gramas">250g</div>
    <img src="img/casadinho.jpeg" alt="Casadinho">
    <button class="btn-card btn-ver">Ver mais</button>
    <button class="btn-card btn-preco">R$10,99</button>
  </div>
</section>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const menuLateral = document.getElementById('menuLateral');
  const menuClose = document.getElementById('menuClose');

  menuBtn.addEventListener('click', () => menuLateral.classList.add('ativo'));
  menuClose.addEventListener('click', () => menuLateral.classList.remove('ativo'));
</script>
