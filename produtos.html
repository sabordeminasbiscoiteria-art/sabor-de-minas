<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Nossos Produtos</title>

<link rel="stylesheet" href="style.css">

<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="produtos-page">

<header>

<nav>
<a href="index.html">Início</a>

<div class="search-box">
<i class="fa fa-search"></i>
<input type="text" id="searchInput" placeholder="Pesquisar produto...">
</div>

</header>

<section class="products">

<div class="grid">

<div class="card" data-name="casadinho">
<img src="img/casadinho.jpeg" alt="Casadinho">
<h3>Casadinho</h3>
<p>Caseiro</p>
<button class="btn-detalhes" onclick="abrirProduto('casadinho')">Ver mais</button>
</div>

<div class="card" data-name="casadinho goiabada">
<img src="img/casadinhoo.jpeg" alt="Casadinho Goiabada">
<h3>Casadinho Goiabada</h3>
<p>Caseiro</p>
<button class="btn-detalhes" onclick="abrirProduto('goiabada')">Ver mais</button>
</div>

<div class="card" data-name="canela">
<img src="img/canela.jpeg" alt="Canela">
<h3>Canela</h3>
<p>Caseiro</p>
<button class="btn-detalhes" onclick="abrirProduto('canela')">Ver mais</button>
</div>

<div class="card" data-name="ugauga">
<img src="img/ugauga.jpeg" alt="Uga-uga">
<h3>Uga-uga</h3>
<p>Caseiro</p>
<button class="btn-detalhes" onclick="abrirProduto('ugauga')">Ver mais</button>
</div>

<div class="card" data-name="beijinho">
<img src="img/beijinho.jpeg" alt="Beijinho">
<h3>Beijinho</h3>
<p>Caseiro</p>
<button class="btn-detalhes" onclick="abrirProduto('beijinho')">Ver mais</button>
</div>

<div class="card" data-name="bambole">
<img src="img/banbole.jpeg" alt="Bambolê">
<h3>Bambolê</h3>
<p>Caseiro</p>
<button class="btn-detalhes" onclick="abrirProduto('bambole')">Ver mais</button>
</div>

<div class="card" data-name="sasha">
<img src="img/sasha.jpeg" alt="Sasha">
<h3>Sasha</h3>
<p>Caseiro</p>
<button class="btn-detalhes" onclick="abrirProduto('sasha')">Ver mais</button>
</div>

</div>

<p class="no-result" id="noResult" style="display:none;">
Produto não encontrado
</p>

</section>

<!-- MODAL PRODUTO -->

<div class="modal" id="produtoModal">

<div class="modal-content">

<span class="fechar" onclick="fecharProduto()">&times;</span>

<h2 id="produtoTitulo"></h2>

<p id="produtoDescricao"></p>

</div>

</div>

<!-- BOTÃO WHATSAPP -->
<a href="https://wa.me/5531992767228" class="whatsapp-float" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
</a>

<script>

const searchInput = document.getElementById("searchInput");
const products = document.querySelectorAll(".card");
const noResult = document.getElementById("noResult");

searchInput.addEventListener("keyup", () => {

let search = searchInput.value.toLowerCase();
let visible = 0;

products.forEach(card => {

let name = card.getAttribute("data-name");

if(name.includes(search)){
card.style.display = "block";
visible++;
}else{
card.style.display = "none";
}

});

noResult.style.display = visible === 0 ? "block" : "none";

});

/* DESCRIÇÃO PRODUTOS */

const descricaoProdutos = {

casadinho: "Biscoito amanteigado tradicional recheado com goiabada. Disponível em nossa loja física.",

goiabada: "Casadinho delicioso com recheio de goiabada artesanal. Disponível em nossa loja física.",

canela: "Biscoito crocante com sabor suave de canela. Disponível em nossa loja física.",

ugauga: "Biscoito caseiro tradicional muito saboroso. Disponível em nossa loja física.",

beijinho: "Biscoito doce com sabor delicado de coco. Disponível em nossa loja física.",

bambole: "Biscoito crocante e leve perfeito para café. Disponível em nossa loja física.",

sasha: "Biscoito amanteigado caseiro muito macio. Disponível em nossa loja física."

};

function abrirProduto(nome){

document.getElementById("produtoModal").style.display="flex";

document.getElementById("produtoTitulo").innerText=nome;

document.getElementById("produtoDescricao").innerText=descricaoProdutos[nome];

}

function fecharProduto(){

document.getElementById("produtoModal").style.display="none";

}

</script>

</body>
</html>
