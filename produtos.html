<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nossos Produtos</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="produtos-page">

<header>
<!-- BOTÃO MENU -->
<div class="menu-btn" onclick="abrirMenu()">
<i class="fa fa-bars"></i>
</div>

<!-- MENU HORIZONTAL -->
<div class="logo">
<img src="img/logo.png" alt="Biscoiteria Sabor de Minas">
</div>

<nav>
<a href="index.html">Início</a>
<a href="produtos.html">Biscoitos</a>
<a href="sobre.html">Sobre</a>
<a href="contato.html">Contato</a>
</nav>

<div class="search-box">
<i class="fa fa-search"></i>
<input type="text" id="searchInput" placeholder="Pesquisar produto...">
</div>

<!-- DESCRIÇÃO -->
<p class="descricao-biscoitos">
Biscoitos artesanais
</p>

</header>

<!-- MENU LATERAL -->
<div id="menu-lateral" class="menu-lateral">

<div class="fechar-menu" onclick="fecharMenu()">
<i class="fa fa-times"></i>
</div>

<a href="index.html">Início</a>
<a href="produtos.html">Biscoitos</a>
<a href="sobre.html">Sobre</a>
<a href="contato.html">Contato</a>

</div>

<section class="products">
<div class="grid">
<!-- Adicione os cards aqui -->
</div>

<p id="noResult" style="display:none;">Produto não encontrado</p>

</section>

<!-- MODAL -->
<div id="produtoModal" class="modal">
<div class="modal-content">
<span class="fechar" onclick="fecharProduto()">&times;</span>
<h2 id="produtoTitulo"></h2>
<p id="produtoDescricao"></p>
</div>
</div>

<!-- BOTÃO WHATSAPP -->
<a href="https://wa.me/5531992767228" class="whatsapp-float" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
</a>

<script>
function abrirMenu(){
document.getElementById("menu-lateral").classList.add("ativo");
}

function fecharMenu(){
document.getElementById("menu-lateral").classList.remove("ativo");
}

const searchInput = document.getElementById("searchInput");
const products = document.querySelectorAll(".card");
const noResult = document.getElementById("noResult");

searchInput.addEventListener("keyup", () => {
let search = searchInput.value.toLowerCase();
let visible = 0;

products.forEach(card => {
let name = card.getAttribute("data-name").toLowerCase();

if(name.includes(search)){
card.style.display = "block";
visible++;
}else{
card.style.display = "none";
}
});

noResult.style.display = visible === 0 ? "block" : "none";
});

const descricaoProdutos = {
casadinho: "Biscoito amanteigado tradicional recheado com goiabada. Disponível em nossa loja física.",
goiabada: "Casadinho delicioso com recheio de goiabada artesanal. Disponível em nossa loja física.",
canela: "Biscoito crocante com sabor suave de canela. Disponível em nossa loja física.",
ugauga: "Biscoito caseiro tradicional muito saboroso. Disponível em nossa loja física.",
beijinho: "Biscoito doce com sabor delicado de coco. Disponível em nossa loja física.",
bambole: "Biscoito crocante e leve perfeito para café. Disponível em nossa loja física.",
sasha: "Biscoito amanteigado caseiro muito macio. Disponível em nossa loja física."
};

function abrirProduto(id,nome){
document.getElementById("produtoModal").style.display = "flex";
document.getElementById("produtoTitulo").innerText = nome;
document.getElementById("produtoDescricao").innerText = descricaoProdutos[id];
}

function fecharProduto(){
document.getElementById("produtoModal").style.display = "none";
}
</script>

</body>
</html>
